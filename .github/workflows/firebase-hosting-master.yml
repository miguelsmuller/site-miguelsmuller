name: Deploy to Live

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set environment variables
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud.json
          echo "HYGRAPH_URL=${{ secrets.HYGRAPH_URL }}" > .env
          echo "HYGRAPH_KEY=${{ secrets.HYGRAPH_KEY }}" >> .env
          if [ -n "${{ secrets.REVALIDATE_SECRET }}" ]; then
            echo "REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}" >> .env
          fi

      - name: Install dependencies
        run: npm ci && npm run build

      - name: Install Firebase CLI (v13.35.1)
        run: npm install -g firebase-tools@13.35.1

      - name: Deploy to Live
        run: |
          firebase experiments:enable webframeworks
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud.json
          npx firebase-tools deploy --only hosting -m "Deploying ${{ github.sha }}" --force
